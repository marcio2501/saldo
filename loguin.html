<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login com Google</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#007bff,#00c6ff);
      height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box {
      background:#fff;
      padding:40px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      width:300px;
    }

    h2 {
      margin-bottom:20px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Entrar com Google</h2>

  <div id="g_id_onload"
       data-client_id="23150081206-lnlifd6mske85annts6qjic0vbscm83g.apps.googleusercontent.com"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>

  <div class="g_id_signin"
       data-type="standard"
       data-size="large"
       data-theme="outline">
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDL13nI9U6o7EBlLburfoUsRgd24si8bAg",
  authDomain: "arquivos-e9875.firebaseapp.com",
  projectId: "arquivos-e9875"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function handleCredentialResponse(response) {

  const data = parseJwt(response.credential);

  const userId = data.email;

  try {

    const ref = db.collection("usuarios").doc(userId);
    const doc = await ref.get();

    if (!doc.exists) {
      // 🔥 cria usuário novo
      await ref.set({
        nome: data.name,
        email: data.email,
        foto: data.picture,
        saldo: 0, // 🔥 importante
        criadoEm: new Date()
      });
    } else {
      // 🔄 atualiza apenas dados básicos (não perde saldo)
      await ref.update({
        nome: data.name,
        foto: data.picture
      });
    }

    // 💾 salva local
    localStorage.setItem("usuario_nome", data.name);
    localStorage.setItem("usuario_email", data.email);

    // 🚀 redireciona
    window.location.href =
      "https://marcio2501.github.io/saldo/cliente.html?id=" +
      encodeURIComponent(userId);

  } catch (e) {
    console.error("Erro login:", e);
    alert("Erro ao fazer login");
  }
}

function parseJwt(token) {
  let base64Url = token.split('.')[1];
  let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(jsonPayload);
}
</script>

</body>
</html>
