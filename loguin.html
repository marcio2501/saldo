<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login com Google</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#007bff,#00c6ff);
      height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box {
      background:#fff;
      padding:40px;
      border-radius:12px;
      text-align:center;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login com Google</h2>

  <div id="g_id_onload"
       data-client_id="23150081206-lnlifd6mske85annts6qjic0vbscm83g.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>

  <div class="g_id_signin"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDL13nI9U6o7EBlLburfoUsRgd24si8bAg",
  authDomain: "arquivos-e9875.firebaseapp.com",
  projectId: "arquivos-e9875"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function handleCredentialResponse(response) {

  const data = parseJwt(response.credential);

  // 🔥 cria ID único
  const userId = Date.now();

  // 🔥 salva no firebase
  db.collection("usuarios").doc(userId.toString()).set({
    nome: data.name,
    email: data.email,
    foto: data.picture,
    timestamp: new Date()
  });

  // 🔥 salva no navegador
  localStorage.setItem("usuario_nome", data.name);
  localStorage.setItem("usuario_email", data.email);
  localStorage.setItem("usuario_id", userId);

  // 🔥 REDIRECIONA COM ID
  window.location.href = "https://marcio2501.github.io/saldo/cliente.html?id=" + userId;
}

function parseJwt(token) {
  let base64Url = token.split('.')[1];
  let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join(''));
  return JSON.parse(jsonPayload);
}
</script>

</body>
</html>
