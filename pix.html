<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pagamento</title>
</head>

<body style="text-align:center;font-family:Arial">

<h2>Escolha o tempo</h2>

<select id="tempo">
  <option value="5">5 minutos</option>
  <option value="10">10 minutos</option>
  <option value="20">20 minutos</option>
</select>

<br><br>

<button onclick="pagar()">Realizar Pagamento</button>

<script>

function pagar(){

    let nome = "Pai Marcio";
    let valorPorMinuto = 1.99;

    let minutos = document.getElementById("tempo").value;

    let valor = (minutos * valorPorMinuto).toFixed(2);

    // converte para formato brasileiro
    valor = valor.replace(".", ",");

    let descricao = encodeURIComponent(
        `Consulta com ${nome} - ${minutos} minutos`
    );

    window.location.href =
    `https://pagamento.helioho.st/index.php?valor=${valor}&descricao=${descricao}`;
}

</script>

</body>
</html>
