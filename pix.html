<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Pagamento</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f5f5f5;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:20px 16px;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.box{
  background:#fff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.topo-img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

.texto-info{
  text-align:center;
  font-weight:600;
  color:#1b5e20;
  font-size:13px;
  margin-bottom:12px;
}

.urgencia{
  text-align:center;
  font-weight:700;
  margin-bottom:14px;
  color:#1b5e20;
  font-size:13px;
}

.urgencia span{
  font-size:20px;
  display:block;
}

.option{
  border:1px solid #e6c068;
  padding:18px;
  margin-bottom:12px;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  display:flex;
  justify-content:space-between;
}

.option.selected{
  background:#ffe58a;
}

.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:25px;
  background:linear-gradient(45deg,#00c9a7,#00bfa5);
  color:#fff;
  font-size:17px;
  font-weight:700;
}

.btn:disabled{
  opacity:0.5;
}

</style>
</head>

<body>

<div class="container">
  <div class="box">

    <img class="topo-img" src="https://i.ibb.co/6h28fNp/Chat-GPT-Image-11-04-2026-19-41-52.png">

    <div class="urgencia">
      🔥 Seu consultor está disponível agora<br>
      <span id="contador">20</span>
    </div>

    <div id="opcoes"></div>

    <button id="btn" class="btn" disabled>
      Realizar Pagamento
    </button>

  </div>
</div>

<script>

// 🔐 EMAIL
const email = localStorage.getItem("usuario_email");

if(!email){
  alert("Faça login primeiro");
  window.location.href = "loguin.html";
}

// CONTADOR
const contadorEl = document.getElementById("contador");

function iniciarContagem(){
  let tempo = Math.floor(Math.random() * 20) + 10;
  contadorEl.innerText = tempo;

  setInterval(()=>{
    tempo--;
    contadorEl.innerText = tempo;

    if(tempo <= 0){
      tempo = 20;
    }
  },1000);
}

iniciarContagem();

// PACOTES
const minutos = [5,10,20,30];
const valorBase = 1.99;

let precoFinal = null;
let minutosSelecionados = null;

const opcoes = document.getElementById("opcoes");
const btn = document.getElementById("btn");

minutos.forEach(m=>{

  const preco = (m * valorBase).toFixed(2);

  const div = document.createElement("div");
  div.className="option";

  div.innerHTML = `
    <div>${m} minutos</div>
    <div>R$ ${preco}</div>
  `;

  div.onclick = () => {
    document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
    div.classList.add("selected");

    precoFinal = preco;
    minutosSelecionados = m;

    btn.disabled = false;
  };

  opcoes.appendChild(div);

});

// 💳 PAGAMENTO
btn.onclick = () => {

  btn.innerText = "Processando...";
  btn.disabled = true;

  setTimeout(()=>{

    const valorFormatado = precoFinal.replace('.', ',');
    const descricao = encodeURIComponent(`Consulta - ${minutosSelecionados} minutos`);
    const emailEncoded = encodeURIComponent(email);

    window.location.href =
    `https://pagamentopix.helioho.st/index.php?valor=${valorFormatado}&descricao=${descricao}&email=${emailEncoded}&redirect=${encodeURIComponent("https://marcio2501.github.io/saldo/cliente.html")}`;

  }, 800);

};

</script>

</body>
</html>
