<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pagamentos</title>
</head>

<body style="text-align:center;font-family:Arial">

<h1>💰 Total pago</h1>

<h2 id="valor">Carregando...</h2>

<script>

async function carregar(){
    let r = await fetch("saldo.php");
    let t = await r.text();

    document.getElementById("valor").innerText = "R$ " + t;
}

setInterval(carregar, 3000);
carregar();

</script>

</body>
</html>
