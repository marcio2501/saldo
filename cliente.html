<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartomantes Online</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* 🔵 HEADER */
header {
  background: linear-gradient(135deg,#007bff,#00c6ff);
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* 🏷️ NOME DO SITE */
.logo {
  font-size:18px;
  font-weight:bold;
}

/* 💰 SALDO */
.saldo-topo {
  text-align:left;
}

.saldo-topo small {
  display:block;
  font-size:12px;
  opacity:0.8;
}

#saldoValor {
  font-size:20px;
  font-weight:bold;
}

/* 👤 USUÁRIO */
.user-box {
  display:flex;
  align-items:center;
  gap:10px;
}

.user-box img {
  width:35px;
  height:35px;
  border-radius:50%;
}

.user-info {
  text-align:right;
  font-size:13px;
}

/* 🧱 CONTEÚDO */
.container {
  padding:30px;
}
</style>
</head>

<body>

<header>

  <!-- 💰 SALDO -->
  <div class="saldo-topo">
    <small>Saldo disponível</small>
    <div id="saldoValor">R$ 0,00</div>
  </div>

  <!-- 🏷️ LOGO -->
  <div class="logo">Cartomantes Online</div>

  <!-- 👤 USUÁRIO -->
  <div class="user-box">
    <div class="user-info">
      <div id="userNome">Carregando...</div>
    </div>
    <img id="userFoto" src="" alt="">
  </div>

</header>

<div class="container">
  <!-- espaço em branco conforme pediu -->
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDL13nI9U6o7EBlLburfoUsRgd24si8bAg",
  authDomain: "arquivos-e9875.firebaseapp.com",
  projectId: "arquivos-e9875"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const email = localStorage.getItem("usuario_email");

if(!email){
  alert("Faça login primeiro");
  window.location.href = "loguin.html";
}

/* 🔥 CARREGA DADOS DO USUÁRIO */
db.collection("usuarios").doc(email).onSnapshot(doc => {
  if(doc.exists){

    const data = doc.data();

    // 👤 nome
    document.getElementById("userNome").innerText = data.nome;

    // 📸 foto
    if(data.foto){
      document.getElementById("userFoto").src = data.foto;
    }

    // 💰 saldo
    const saldo = data.saldo || 0;

    document.getElementById("saldoValor").innerText =
      saldo.toLocaleString("pt-BR", {
        style:"currency",
        currency:"BRL"
      });

  }
});
</script>

</body>
</html>
