<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartomantes Online</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* 🔵 HEADER */
header {
  background: linear-gradient(135deg,#007bff,#00c6ff);
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* 🏷️ LOGO */
.logo {
  font-size:18px;
  font-weight:bold;
}

/* 💰 SALDO */
.saldo-topo small {
  display:block;
  font-size:12px;
  opacity:0.8;
}

#saldoValor {
  font-size:20px;
  font-weight:bold;
}

/* 👤 USUÁRIO */
.user-box {
  display:flex;
  align-items:center;
  gap:10px;
}

.user-box img {
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid white;
}

/* INFO */
.user-info {
  text-align:right;
  font-size:13px;
}

/* 🔴 BOTÃO SAIR */
.logout {
  display:block;
  font-size:12px;
  margin-top:3px;
  color:#ffe;
  cursor:pointer;
  text-decoration:underline;
}

.logout:hover {
  color:#fff;
}

/* CONTEÚDO */
.container {
  padding:30px;
}
</style>
</head>

<body>

<header>

  <!-- 💰 SALDO -->
  <div class="saldo-topo">
    <small>Saldo disponível</small>
    <div id="saldoValor">R$ 0,00</div>
  </div>

  <!-- 🏷️ SITE -->
  <div class="logo">Cartomantes Online</div>

  <!-- 👤 USUÁRIO -->
  <div class="user-box">
    <div class="user-info">
      <div id="userNome">Carregando...</div>
      <span class="logout" onclick="logout()">Sair</span>
    </div>
    <img id="userFoto" src="https://via.placeholder.com/40" alt="">
  </div>

</header>

<div class="container">
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDL13nI9U6o7EBlLburfoUsRgd24si8bAg",
  authDomain: "arquivos-e9875.firebaseapp.com",
  projectId: "arquivos-e9875"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const email = localStorage.getItem("usuario_email");

if(!email){
  window.location.href = "loguin.html";
}

/* 🔥 CARREGA DADOS */
db.collection("usuarios").doc(email).onSnapshot(doc => {
  if(doc.exists){

    const data = doc.data();

    // nome
    document.getElementById("userNome").innerText = data.nome || "Usuário";

    // foto (corrigido)
    if(data.foto){
      document.getElementById("userFoto").src = data.foto;
    }

    // saldo
    const saldo = data.saldo || 0;

    document.getElementById("saldoValor").innerText =
      saldo.toLocaleString("pt-BR", {
        style:"currency",
        currency:"BRL"
      });
  }
});

/* 🔓 LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href = "loguin.html";
}
</script>

</body>
</html>
