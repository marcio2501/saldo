<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f9fafc;
}

header {
  background: linear-gradient(135deg,#007bff,#00c6ff);
  color:white;
  padding:20px;
  text-align:center;
  position:relative;
}

.user {
  position:absolute;
  top:10px;
  right:20px;
  font-size:14px;
  font-weight:bold;
}

nav {
  background:#222;
  padding:10px;
  text-align:center;
}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

.container {
  padding:30px;
}

.card {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
  <div class="user" id="userNome">Carregando...</div>
  <h1>Área do Cliente</h1>
</header>

<nav>
  <a href="#">Início</a>
  <a href="#">Serviços</a>
</nav>

<div class="container">

  <div class="card">
    <h2>Bem-vindo</h2>
    <p id="mensagem"></p>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDL13nI9U6o7EBlLburfoUsRgd24si8bAg",
  authDomain: "arquivos-e9875.firebaseapp.com",
  projectId: "arquivos-e9875"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 pega da URL
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get("id");

// 🔥 tenta local primeiro
const nomeLocal = localStorage.getItem("usuario_nome");

if(nomeLocal){
  document.getElementById("userNome").innerText = "👤 " + nomeLocal;
  document.getElementById("mensagem").innerText = "Bem-vindo, " + nomeLocal;
} 

// 🔥 busca no firebase se necessário
if(userId){
  db.collection("usuarios").doc(userId).get()
  .then(doc=>{
    if(doc.exists){
      const data = doc.data();

      document.getElementById("userNome").innerText = "👤 " + data.nome;
      document.getElementById("mensagem").innerText = "Bem-vindo, " + data.nome;

      // salva local
      localStorage.setItem("usuario_nome", data.nome);
      localStorage.setItem("usuario_email", data.email);
    }
  });
}
</script>

</body>
</html>
